name: Publish Release Build Image

on:
  push:
    branches: [main]
    paths:
      - ".github/docker/release-build.Dockerfile"
      - ".github/workflows/publish-release-build-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  RELEASE_BUILD_IMAGE: ghcr.io/anothergenz/nanite-clip-release-build

jobs:
  publish:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.RELEASE_BUILD_IMAGE }}
          tags: |
            type=raw,value=ubuntu25.04
            type=sha,prefix=sha-

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/release-build.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
