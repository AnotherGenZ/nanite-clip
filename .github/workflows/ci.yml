name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Format + OBS guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Guard OBS parameter keys
        run: |
          if rg -n '"RecFormat2?"' src/ | rg -v 'src/capture/obs.rs'; then
            echo "OBS parameter literal found outside src/capture/obs.rs"
            exit 1
          fi
      - run: cargo fmt --check

  verify:
    name: Verify (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            linux_deps: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            linux_deps: false
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux native dependencies
        if: ${{ matrix.linux_deps }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libglib2.0-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libxdo-dev
      - run: cargo test --target ${{ matrix.target }}
      - run: cargo clippy --target ${{ matrix.target }} --all-targets --all-features -- -D warnings
